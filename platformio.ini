[platformio]
; Puoi cambiare l'ambiente di default qui, oppure sceglierlo dal menu di VSCode
default_envs = target

; ==========================================
; ENV 1: TARGET (Il nodo a batteria)
; ==========================================
[env:target]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200

; Compila SOLO main.cpp, ignora monitor.cpp
build_src_filter = +<main.cpp> -<monitor.cpp>

; Dipendenze specifiche per il nodo target
lib_deps = 
    kosme/arduinoFFT @ ^2.0.4
    knolleary/PubSubClient @ ^2.8.0
    jgromes/RadioLib @ ^6.6.0


; ==========================================
; ENV 2: MONITOR (Il nodo via cavo con INA219)
; ==========================================
[env:monitor]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200

; Compila SOLO monitor.cpp, ignora main.cpp
build_src_filter = +<monitor.cpp> -<main.cpp>

; Dipendenze specifiche per il monitor
lib_deps = 
    adafruit/Adafruit INA219 @ ^1.2.3